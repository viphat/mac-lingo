# XcodeGen project definition — source of truth for MacLingo.xcodeproj.
# Regenerate the project with `xcodegen generate` (the .xcodeproj is git-ignored).
name: MacLingo

options:
  bundleIdPrefix: com.sharewis.maclingo
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete        # Swift 6 strict concurrency (CLAUDE.md)
    ARCHS: "$(ARCHS_STANDARD)"                 # universal slices available
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""                        # TODO: Developer ID team for signing
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    # Debug builds the active arch only (fast; sidesteps an Xcode universal +
    # SwiftPM module bug). Release stays universal for distribution (verified at
    # Phase 8 packaging).
    Debug:
      ONLY_ACTIVE_ARCH: YES
      CODE_SIGNING_ALLOWED: NO
    Release:
      ONLY_ACTIVE_ARCH: NO

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: "9.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  MacLingo:
    type: application
    platform: macOS
    sources:
      - path: Sources/MacLingo
    info:
      path: Sources/MacLingo/Resources/Info.plist
      properties:
        LSUIElement: true                       # menu-bar agent, no Dock icon
        LSMinimumSystemVersion: "15.0"
        CFBundleDisplayName: MacLingo
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "© 2026 ShareWis"
        # Sparkle update trust (spec §10). The appcast host is a control-plane host
        # (§9) and never receives selected text. `SURequireSignedFeed` protects the
        # feed metadata as well as each archive; signatures are verified before
        # extraction. `SUPublicEDKey` is the embedded EdDSA public key.
        # TODO(release): set the real appcast URL and paste the EdDSA public key
        # before notarizing (see docs/RELEASE.md). Placeholders are intentional so a
        # dev build never reaches a real update server.
        SUFeedURL: "https://updates.maclingo.invalid/appcast.xml"
        SUPublicEDKey: ""
        SURequireSignedFeed: true
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    entitlements:
      path: Sources/MacLingo/Resources/MacLingo.entitlements
      properties:
        com.apple.security.app-sandbox: false   # sandbox is incompatible (spec §10)
        com.apple.security.network.client: true
    dependencies:
      - package: KeyboardShortcuts
      - package: Defaults
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sharewis.maclingo
        CODE_SIGN_IDENTITY: "Developer ID Application"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MacLingoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MacLingoTests
    dependencies:
      - target: MacLingo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sharewis.maclingo.tests

schemes:
  MacLingo:
    build:
      targets:
        MacLingo: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MacLingoTests
